<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Turni Ally - Registro Totale</title>
    <style>
        :root {
            --rose-gold: #b76e79;
            --light-rose: #f9f1f2;
            --dark-rose: #8a4f58;
            --gold-gradient: linear-gradient(135deg, #e0b0b6 0%, #b76e79 50%, #8a4f58 100%);
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #faf6f6;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Schermata Login */
        .login-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: var(--gold-gradient);
        }

        .login-main-title {
            color: var(--white);
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.15);
        }

        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h2 {
            color: var(--rose-gold);
            margin-top: 0;
            margin-bottom: 30px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        /* Dashboard */
        .dashboard {
            display: none;
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }

        header {
            background: var(--gold-gradient);
            color: white;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(183, 110, 121, 0.3);
            margin-bottom: 30px;
        }

        header h1 { margin: 0; font-weight: 300; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--rose-gold);
            margin-bottom: 25px;
        }

        .card h3 {
            margin-top: 0;
            color: var(--dark-rose);
            border-bottom: 1px solid var(--light-rose);
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark-rose);
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0b0b6;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--light-rose);
            color: #333;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--rose-gold);
        }

        .btn {
            background: var(--gold-gradient);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-secondary { background: #7f8c8d; }
        .btn-danger { background: #c94c4c; }
        .btn-warning { background: #f39c12; }

        .suggest-btn {
            background: #eededf;
            color: var(--dark-rose);
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            margin-right: 5px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .suggest-btn:hover {
            background: #e0b0b6;
        }

        /* Widget Stipendio */
        .salary-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .salary-widget {
            background: var(--light-rose);
            border: 1px dashed var(--rose-gold);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .salary-amount {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-rose);
            margin-top: 5px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        /* Tabella */
        .table-container { overflow-x: auto; max-height: 500px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eededf; }
        th { background-color: var(--light-rose); color: var(--dark-rose); position: sticky; top: 0; }
        tr:hover { background-color: #fdfafb; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-goldbet { background: #e3f2fd; color: #0d47a1; }
        .badge-planet { background: #fff3e0; color: #e65100; }
        .badge-generic { background: #e8e8e8; color: #555555; }

        /* Stile Ricerca Giorno */
        .search-box {
            display: flex;
            gap: 15px;
            align-items: flex-end;
            background: #fffcfc;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eededf;
            margin-top: 10px;
        }
        .search-result-box {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            background-color: #f1f9f5;
            border-left: 5px solid #2ecc71;
            display: none;
        }
    </style>
</head>
<body>

        <div class="login-main-title">Gestione turni Ally</div>
        
        <div class="login-card">
            <h2>Accesso Riservato</h2>
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Inserisci il tuo username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Inserisci la tua password">
            </div>
            <button class="btn" style="width:100%; margin-top:10px;" onclick="checkLogin()">Accedi</button>
            <p id="loginError" style="color:red; font-size:14px; display:none; margin-top:15px;">Credenziali errate, Amo!</p>
        </div>
    </div>

    <div id="dashboardPage" class="dashboard">
        <header>
            <h1>Registro Turni Personale ✨</h1>
            <button class="btn btn-danger" onclick="logout()">Esci</button>
