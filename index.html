<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Ally</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Google Sans',sans-serif;
}

body{
background:#f6f8fc;
height:100vh;
display:flex;
flex-direction:column;
}

header{
height:64px;
background:white;
border-bottom:1px solid #dadce0;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:22px;
font-weight:700;
color:#1a73e8;
}

.container{
flex:1;
display:flex;
overflow:hidden;
}

.sidebar{
width:320px;
background:white;
border-right:1px solid #dadce0;
padding:20px;
overflow:auto;
}

.content{
flex:1;
padding:20px;
overflow:auto;
}

.card{
background:white;
border-radius:16px;
padding:16px;
margin-bottom:20px;
box-shadow:0 1px 3px rgba(0,0,0,.1);
}

.card h3{
margin-bottom:12px;
color:#1f1f1f;
}

input,select{
width:100%;
padding:10px;
border:1px solid #dadce0;
border-radius:8px;
margin-top:8px;
margin-bottom:12px;
}

button{
background:#1a73e8;
color:white;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:600;
}

button:hover{
background:#1557b0;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.calendar-header h2{
font-size:28px;
}

.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:1px;
background:#dadce0;
border:1px solid #dadce0;
}

.day-name{
background:#f8f9fa;
padding:12px;
text-align:center;
font-weight:600;
}

.day{
background:white;
height:120px;
padding:8px;
overflow:auto;
}

.day-number{
font-size:14px;
font-weight:600;
margin-bottom:5px;
}

.today{
background:#e8f0fe;
}

.event{
font-size:11px;
padding:4px 6px;
border-radius:6px;
margin-bottom:3px;
color:white;
}

.shift{
background:#1a73e8;
}

.commitment{
background:#34a853;
}

.finance{
background:#1a73e8;
color:white;
}

.finance-value{
font-size:30px;
font-weight:700;
margin-top:10px;
}

.list-item{
padding:10px;
border:1px solid #eee;
border-radius:8px;
margin-bottom:8px;
}

</style>
</head>
<body>

<header>
<div class="logo">
📅 Agenda Ally
</div>

<div id="currentMonth"></div>
</header>

<div class="container">

<div class="sidebar">

<div class="card">

<h3>Nuovo Turno</h3>

<input type="date" id="shiftDate">

<select id="shiftType">
<option>Mattina</option>
<option>Pomeriggio</option>
<option>Malattia</option>
</select>

<select id="shiftLocation">
<option>Goldbet Stazione</option>
<option>Planetwin365</option>
<option>Nessuna</option>
</select>

<input type="number" id="extraAmount" placeholder="Extra €">

<button onclick="addShift()">Salva Turno</button>

</div>

<div class="card">

<h3>Nuovo Impegno</h3>

<input type="text" id="commTitle" placeholder="Titolo">

<input type="date" id="commDate">

<input type="time" id="commTime">

<button onclick="addCommitment()">Salva Impegno</button>

</div>

<div class="card finance">

<h3>Finanze</h3>

<input
type="number"
id="baseSalary"
placeholder="Stipendio Base"
style="color:black;background:white;"
>

<div class="finance-value">
€ <span id="salaryTotal">0</span>
</div>

</div>

<div class="card">

<h3>Prossimi Impegni</h3>

<div id="upcoming"></div>

</div>

</div>

<div class="content">

<div class="calendar-header">

<button style="width:80px" onclick="prevMonth()">◀</button>

<h2 id="monthTitle"></h2>

<button style="width:80px" onclick="nextMonth()">▶</button>

</div>

<div class="calendar" id="calendar"></div>

</div>

</div>

<script>

let shifts =
JSON.parse(localStorage.getItem("ally_shifts") || "[]");

let commitments =
JSON.parse(localStorage.getItem("ally_commitments") || "[]");

let currentDate = new Date();

const monthNames = [
"Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno",
"Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"
];

function saveData(){

localStorage.setItem(
"ally_shifts",
JSON.stringify(shifts)
);

localStorage.setItem(
"ally_commitments",
JSON.stringify(commitments)
);

localStorage.setItem(
"ally_month",
JSON.stringify({
month:currentDate.getMonth(),
year:currentDate.getFullYear()
})
);

localStorage.setItem(
"ally_salary",
document.getElementById("baseSalary").value
);

}

function loadData(){

const salary =
localStorage.getItem("ally_salary");

if(salary)
document.getElementById("baseSalary").value=salary;

const savedMonth=
JSON.parse(localStorage.getItem("ally_month"));

if(savedMonth){

currentDate=new Date(
savedMonth.year,
savedMonth.month,
1
);

}else{

currentDate=new Date();

}

}

function addShift(){

const shift={
date:document.getElementById("shiftDate").value,
type:document.getElementById("shiftType").value,
location:document.getElementById("shiftLocation").value,
extra:Number(document.getElementById("extraAmount").value||0)
};

if(!shift.date)return;

shifts.push(shift);

saveData();
renderCalendar();
updateFinance();
}

function addCommitment(){

const item={
title:document.getElementById("commTitle").value,
date:document.getElementById("commDate").value,
time:document.getElementById("commTime").value
};

if(!item.title || !item.date)return;

commitments.push(item);

saveData();
renderCalendar();
renderUpcoming();
}

function renderCalendar(){

const cal=document.getElementById("calendar");

cal.innerHTML="";

[
"Lun","Mar","Mer","Gio","Ven","Sab","Dom"
].forEach(d=>{

const el=document.createElement("div");
el.className="day-name";
el.textContent=d;
cal.appendChild(el);

});

const year=currentDate.getFullYear();
const month=currentDate.getMonth();

document.getElementById("monthTitle").textContent=
monthNames[month]+" "+year;

document.getElementById("currentMonth").textContent=
monthNames[month]+" "+year;

const firstDay=
(new Date(year,month,1).getDay()+6)%7;

const daysInMonth=
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

const empty=document.createElement("div");
empty.className="day";
cal.appendChild(empty);

}

for(let day=1;day<=daysInMonth;day++){

const box=document.createElement("div");

box.className="day";

const dateStr=
`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

const today=new Date();

if(
today.getDate()===day &&
today.getMonth()===month &&
today.getFullYear()===year
){
box.classList.add("today");
}

let html=`<div class="day-number">${day}</div>`;

shifts
.filter(s=>s.date===dateStr)
.forEach(s=>{

html+=`
<div class="event shift">
${s.type}
</div>
`;

});

commitments
.filter(c=>c.date===dateStr)
.forEach(c=>{

html+=`
<div class="event commitment">
${c.title}
</div>
`;

});

box.innerHTML=html;

cal.appendChild(box);

}

}

function renderUpcoming(){

const container=
document.getElementById("upcoming");

container.innerHTML="";

commitments
.sort((a,b)=>
new Date(a.date)-new Date(b.date)
)
.slice(0,10)
.forEach(item=>{

container.innerHTML+=`
<div class="list-item">
<b>${item.title}</b><br>
${item.date} ${item.time}
</div>
`;

});

}

function updateFinance(){

const salary=
Number(
document.getElementById("baseSalary").value||0
);

let extras=0;

shifts.forEach(s=>{
extras+=Number(s.extra||0);
});

document.getElementById(
"salaryTotal"
).textContent=(salary+extras).toFixed(2);

saveData();

}

function prevMonth(){

currentDate.setMonth(
currentDate.getMonth()-1
);

saveData();
renderCalendar();

}

function nextMonth(){

currentDate.setMonth(
currentDate.getMonth()+1
);

saveData();
renderCalendar();

}

document
.getElementById("baseSalary")
.addEventListener("input",updateFinance);

loadData();
renderCalendar();
renderUpcoming();
updateFinance();

window.addEventListener(
"beforeunload",
saveData
);

</script>

</body>
</html>
