<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Salva Dati Automatico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #45a049;
        }
        #messaggio {
            color: green;
            margin-top: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h2>I tuoi dati importanti 📌</h2>
    
    <!-- L'area di testo dove scrivi le tue cose -->
    <textarea id="mioTesto" placeholder="Scrivi qui i tuoi dati, turni o appunti..."></textarea>
    <br>
    
    <!-- Il magico Tasto Salva -->
    <button onclick="salvaDati()">Salva Dati</button>
    
    <!-- Un piccolo avviso visivo che conferma il salvataggio -->
    <div id="messaggio"></div>

    <script>
        // 1. Questa funzione si avvia DA SOLA non appena la pagina viene ricaricata
        window.onload = function() {
            // Controlla se ci sono dati salvati nel computer del browser
            const datiSalvati = localStorage.getItem("testoSalvato");
            
            if (datiSalvati) {
                // Se esistono, li rimette dentro la textarea
                document.getElementById("mioTesto").value = datiSalvati;
            }
        };

        // 2. Questa funzione si attiva quando clicchi il tasto "Salva Dati"
        function salvaDati() {
            // Prende il valore corrente della textarea
            const testo = document.getElementById("mioTesto").value;
            
            // Lo salva nel localStorage con la chiave "testoSalvato"
            localStorage.setItem("testoSalvato", testo);
            
            // Mostra un feedback visivo temporaneo
            const messaggio = document.getElementById("messaggio");
            messaggio.innerText = "Dati salvati con successo! Fiuu... 🚀";
            
            // Fa sparire la scritta dopo 3 secondi
            setTimeout(() => {
                messaggio.innerText = "";
            }, 3000);
        }
    </script>

</body>
</html>
