<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestione Turni Ally - Registro Totale</title>
    <style>
        :root {
            --rose-gold: #b76e79;
            --light-rose: #f9f1f2;
            --dark-rose: #8a4f58;
            --gold-gradient: linear-gradient(135deg, #e0b0b6 0%, #b76e79 50%, #8a4f58 100%);
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #faf6f6;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* Dashboard sempre visibile */
        .dashboard {
            display: block;
            max-width: 1200px;
            margin: 30px auto;
            padding: 20px;
        }

        header {
            background: var(--gold-gradient);
            color: white;
            padding: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 15px rgba(183, 110, 121, 0.3);
            margin-bottom: 30px;
        }

        header h1 { margin: 0; font-weight: 300; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border-top: 4px solid var(--rose-gold);
            margin-bottom: 25px;
        }

        .card h3 {
            margin-top: 0;
            color: var(--dark-rose);
            border-bottom: 1px solid var(--light-rose);
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            color: var(--dark-rose);
            font-weight: 600;
            font-size: 14px;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0b0b6;
            border-radius: 8px;
            box-sizing: border-box;
            background-color: var(--light-rose);
            color: #333;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--rose-gold);
        }

        .btn {
            background: var(--gold-gradient);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .btn-secondary { background: #7f8c8d; }
        .btn-warning { background: #f39c12; }

        .suggest-btn {
            background: #eededf;
            color: var(--dark-rose);
            border: none;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
            margin-right: 5px;
            font-weight: 600;
        }

        .salary-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }

        .salary-widget {
            background: var(--light-rose);
            border: 1px dashed var(--rose-gold);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .salary-amount {
            font-size: 24px;
            font-weight: bold;
            color: var(--dark-rose);
            margin-top: 5px;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-layout { grid-template-columns: 1fr; }
        }

        .table-container { overflow-x: auto; max-height: 500px; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eededf; }
        th { background-color: var(--light-rose); color: var(--dark-rose); position: sticky; top: 0; }

        .badge { padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .badge-goldbet { background: #e3f2fd; color: #0d47a1; }
        .badge-planet { background: #fff3e0; color: #e65100; }
        .badge-generic { background: #e8e8e8; color: #555555; }
    </style>
</head>
<body>

    <div class="dashboard">
        <header>
            <h1>Registro Turni Personale ✨</h1>
        </header>

        <!-- Filtro Mese/Anno e Resoconto -->
        <div class="card">
            <h3>Filtra Periodo & Guadagni</h3>
            <div class="input-group" style="max-width: 400px;">
                <label>Seleziona il mese da esaminare:</label>
                <select id="periodFilter" onchange="aggiornaVisualizzazione()">
                </select>
            </div>

            <div class="salary-container">
                <div class="salary-widget">
                    <div>Stipendio Base Mensile</div>
                    <div class="salary-amount">850,00 €</div>
                </div>
                <div class="salary-widget">
                    <div>Turni Extra (Planetwin365)</div>
                    <div class="salary-amount" id="extraCount">0 turni (+0,00 €)</div>
                </div>
                <div class="salary-widget" style="background: var(--gold-gradient); color: white;">
                    <div style="color: white;">Stipendio Totale</div>
                    <div class="salary-amount" id="totalSalary" style="color: white;">850,00 €</div>
                </div>
            </div>
        </div>

        <div class="main-layout">
            <div class="card">
                <h3 id="formTitle">Gestisci Turno</h3>
                <input type="hidden" id="editId" value="">
                
                <div class="input-group">
                    <label>Data</label>
                    <input type="date" id="turnoData" required>
                </div>
                <div class="input-group">
                    <label>Posto di Lavoro</label>
                    <input type="text" id="turnoSede" required>
                    <button type="button" class="suggest-btn" onclick="impostaSedeRapida('Goldbet stazione')">Goldbet</button>
                    <button type="button" class="suggest-btn" onclick="impostaSedeRapida('Planetwin365 via Marsala')">Planet</button>
                </div>
                <div class="input-group">
                    <label>Fascia</label>
                    <select id="turnoFascia">
                        <option value="Mattina">Mattina</option>
                        <option value="Pomeriggio">Pomeriggio</option>
                    </select>
                </div>
                <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <div><label>Ora Inizio</label><input type="time" id="oraInizio" value="09:00"></div>
                    <div><label>Ora Fine</label><input type="time" id="oraFine" value="15:00"></div>
                </div>
                <button class="btn" style="width:100%;" onclick="salvaTurno()">Salva Turno</button>
            </div>

            <div class="card">
                <h3>Elenco Turni</h3>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Data</th><th>Sede</th><th>Fascia</th><th>Orario</th><th>Azioni</th></tr></thead>
                        <tbody id="tabellaTurni"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let turni = JSON.parse(localStorage.getItem('registro_completo_ally_v3')) || [];
        
        // Se è la prima volta, carica lo storico base
        if (turni.length === 0) {
            // (Il tuo array storico rimane uguale qui)
            localStorage.setItem('registro_completo_ally_v3', JSON.stringify(turni));
        }

        window.onload = function() {
            popolaSelettoreMesi();
            aggiornaVisualizzazione();
        };

        function salvaTurno() {
            const nuovoTurno = {
                id: 'id_' + Date.now(),
                data: document.getElementById('turnoData').value,
                sede: document.getElementById('turnoSede').value,
                fascia: document.getElementById('turnoFascia').value,
                inizio: document.getElementById('oraInizio').value,
                fine: document.getElementById('oraFine').value
            };
            turni.push(nuovoTurno);
            localStorage.setItem('registro_completo_ally_v3', JSON.stringify(turni));
            aggiornaVisualizzazione();
        }

        function aggiornaVisualizzazione() {
            // (La tua logica di tabella e calcolo stipendio rimane identica)
        }
        
        // ... (aggiungi le altre funzioni: popolaSelettoreMesi, eliminaTurno, ecc.)
    </script>
</body>
</html>
